<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JewelAR — Upload</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Outfit',sans-serif;
    min-height:100vh;
    display:flex;flex-direction:column;
    background:radial-gradient(circle, rgba(59,28,91,1) 0%, rgba(10,3,16,1) 80%);
    color:#D8BFD8;
  }
  header{
    padding:1.5rem 2.5rem;
    border-bottom:1px solid rgba(216,191,216,.12);
    display:flex;align-items:center;gap:1rem;
    background:rgba(10,3,16,.6);
    backdrop-filter:blur(8px);
  }
  header .logo{font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:.06em;text-shadow:0 0 24px rgba(180,100,255,.6)}
  header nav a{color:#a07cbd;text-decoration:none;margin-left:2rem;font-size:.9rem;transition:color .2s}
  header nav a:hover{color:#fff}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1rem}
  .card{
    background:rgba(45,17,69,.55);
    border:1px solid rgba(216,191,216,.15);
    border-radius:20px;
    padding:2.5rem;
    width:100%;max-width:520px;
    box-shadow:0 0 80px rgba(59,28,91,.8), 0 8px 40px rgba(0,0,0,.6);
    backdrop-filter:blur(12px);
  }
  h1{font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:.4rem;text-shadow:0 0 20px rgba(200,130,255,.5)}
  .sub{color:#9b7eb8;font-size:.9rem;margin-bottom:2rem}
  .field{margin-bottom:1.5rem}
  .field label{display:block;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#b89fc8;margin-bottom:.5rem}
  .badge{background:rgba(59,28,91,.7);border:1px solid rgba(216,191,216,.2);color:#c8a8e0;font-size:.68rem;padding:.1rem .5rem;border-radius:99px;margin-left:.4rem;font-weight:400}
  .drop{
    border:1.5px dashed rgba(216,191,216,.2);
    border-radius:12px;padding:1.4rem;
    text-align:center;cursor:pointer;
    transition:border-color .25s,background .25s,box-shadow .25s;
    position:relative;
  }
  .drop:hover{border-color:rgba(200,130,255,.6);background:rgba(59,28,91,.4);box-shadow:0 0 20px rgba(150,60,255,.2)}
  .drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .drop .icon{font-size:1.8rem;margin-bottom:.4rem}
  .drop p{font-size:.82rem;color:#7a5c9a}
  .drop .chosen{font-size:.82rem;color:#D8BFD8;margin-top:.3rem;font-weight:600}
  .btn{
    width:100%;padding:.9rem;
    background:linear-gradient(135deg,#6a22b8,#9b3ef0);
    color:#fff;font-weight:700;font-size:1rem;
    border:none;border-radius:12px;cursor:pointer;
    font-family:inherit;margin-top:.5rem;
    box-shadow:0 0 30px rgba(130,50,240,.45);
    transition:opacity .2s,box-shadow .2s;
  }
  .btn:hover{opacity:.88;box-shadow:0 0 45px rgba(160,80,255,.6)}
  footer{text-align:center;padding:1.2rem;color:#4a3060;font-size:.78rem}
</style>
</head>
<body>
<header>
  <span class="logo">✦ JewelAR</span>
  <nav><a href="/seller">Upload</a><a href="/seller/dashboard">Dashboard</a></nav>
</header>
<main>
  <div class="card">
    <h1>Upload Jewelry</h1>
    <p class="sub">Upload product images — backgrounds are removed automatically.</p>
    <form method="POST" action="/seller/upload" enctype="multipart/form-data">
      {% for field, icon, label in [('earring_pair','💍','Earring Pair'), ('necklace','📿','Necklace')] %}
      <div class="field">
        <label>{{ icon }} {{ label }} <span class="badge">optional</span></label>
        <div class="drop" id="drop-{{ field }}">
          <input type="file" name="{{ field }}" accept="image/*"
                 onchange="document.getElementById('lbl-{{ field }}').textContent=this.files[0]?.name||''">
          <div class="icon">{{ icon }}</div>
          <p>Click or drag to upload</p>
          <p class="chosen" id="lbl-{{ field }}"></p>
        </div>
      </div>
      {% endfor %}
      <button class="btn" type="submit">✦ Remove Background &amp; Generate Try-On</button>
    </form>
  </div>
</main>
<footer>JewelAR Virtual Try-On Platform</footer>
</body>
</html>
